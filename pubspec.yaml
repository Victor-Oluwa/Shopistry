name: shopistry
description: "A modern furniture e-commerce mobile application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management & DI
  flutter_bloc: ^8.1.3
  flutter_riverpod: ^2.4.9
  
  # Functional Programming
  fpdart: ^0.6.0
  
  # UI & Responsiveness
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.1.0
  
  # Utilities
  equatable: ^2.0.5
  intl: ^0.20.2
  flutter_localization: ^0.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  mocktail: ^1.0.3
  bloc_test: ^9.1.7

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
